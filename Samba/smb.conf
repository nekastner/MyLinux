[global]
   workgroup = WORKGROUP
   server string = PC-Elias
   security = user
   server role = standalone server

   # protocol
   client min protocol = SMB2_10
   client max protocol = SMB3
   server min protocol = SMB2_10
   server max protocol = SMB3

   # symlinks
   follow symlinks = yes
   wide links = no

   # security
   hosts allow = 127.0.0.1 192.168.0. ::1 fe80::/10 fd7c:d608:7473:0::/64 2a02:2c60:f1ab:e1b0::/64
   disable netbios = yes
   smb ports = 445
   restrict anonymous = 2

   # performance
   use sendfile = yes
   aio read size = 16384
   aio write size = 16384
   socket options = TCP_NODELAY IPTOS_LOWDELAY

   # logging
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d

   # network discovery
   multicast dns register = yes

   # prevent acting as a printer (saving resources)
   printing = bsd
   printcap name = /dev/null
   load printers = no
   disable spoolss = yes

   # user shares and includes
   usershare allow guests = no
   include = /etc/samba/user_specific/shares.%U.conf

   # case sensitivity
   case sensitive = auto
   preserve case = yes
   short preserve case = yes

   # interfaces
   interfaces = lo eth0 wlan0
   bind interfaces only = yes

