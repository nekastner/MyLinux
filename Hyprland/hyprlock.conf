general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = ~/.config/hypr/hyprlock-bg.png
    blur_passes = 0
}

# DATE AND TIME

shape {
    monitor =
    size = 400, 50
    color = rgb(50, 50, 50)
    rounding = -1
    border_size = 3
    border_color = rgb(255, 255, 255)
    halign = center
    valign = top
    position = 0, -25
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%Y-%m-%d %H:%M:%S')"
    color = rgb(255, 255, 255)
    font_family = Noto Sans Mono
    font_size = 24
    halign = center
    valign = top
    position = 0, -40
}

# CURRENT USER

shape {
    monitor =
    size = 350, 50
    color = rgb(50, 50, 50)
    rounding = -1
    border_size = 3
    border_color = rgb(255, 255, 255)
    halign = center
    valign = bottom
    position = 0, 25
}

label {
    monitor =
    text = User: $USER
    color = rgb(255, 255, 255)
    font_family = Noto Sans Mono
    font_size = 24
    halign = center
    valign = bottom
    position = 0, 30
}

# PASSWORD

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(255, 255, 255)
    inner_color = rgb(50, 50, 50)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    halign = center
    valign = center
}
